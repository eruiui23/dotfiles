#-------------------------------------- Audio
# bindsym XF86AudioRaiseVolume exec --no-startup-id "pamixer -i 5 && ~/.config/eww/scripts/osd_trigger.sh vol"
# bindsym XF86AudioLowerVolume exec --no-startup-id "pamixer -d 5 && ~/.config/eww/scripts/osd_trigger.sh vol"
bindsym XF86AudioLowerVolume exec --no-startup-id pactl set-sink-volume @DEFAULT_SINK@ -10% && $refresh_i3status && ~/.config/eww/scripts/osd_trigger.sh vol
bindsym XF86AudioRaiseVolume exec --no-startup-id pactl set-sink-volume @DEFAULT_SINK@ +10% && $refresh_i3status && ~/.config/eww/scripts/osd_trigger.sh vol
bindsym XF86AudioMute exec --no-startup-id pactl set-sink-mute @DEFAULT_SINK@ toggle && $refresh_i3status && ~/.config/eww/scripts/osd_trigger.sh vol

#-------------------------------------- Launch App and widget
bindsym $mod+u exec --no-startup-id /home/yucandy16/.local/share/zen/zen 
bindsym $mod+y exec --no-startup-id nemo
bindsym $mod+i exec --no-startup-id dex /home/yucandy16/.local/share/applications/nvim.desktop
bindsym $mod+n exec --no-startup-id kill -s USR1 $(pidof deadd-notification-center)
bindsym $mod+m exec eww open --toggle music-widget

#-------------------------------------- Terminal
bindsym $mod+Return exec --no-startup-id kitty -1
bindsym $mod+Shift+Return exec --no-startup-id kitty --title="nara230"

#-------------------------------------- Exit-Window
bindsym $mod+Escape kill

# ------------------------------------- Rofi
# note : pake convert -strip input.png output.png buat bikin imagenya load cepet
bindsym $mod+space exec --no-startup-id ~/.config/rofi/launchers/type-2/launcher.sh
# bindsym $mod+space exec --no-startup-id ~/.config/rofi/launchers/type-6/launcher_window.sh
bindsym $mod+p exec --no-startup-id /home/yucandy16/.config/rofi/powermenu/type-6/powermenu.sh

# ------------------------------------- Toggle Gap mode
bindsym $mod+g exec --no-startup-id ~/scripts/gaps.sh

# -------------------------------------- Screenshoot
bindsym Print exec --no-startup-id flameshot screen 
bindsym Control+Print exec --no-startup-id flameshot gui
bindsym mod1+z exec --no-startup-id /home/yucandy16/scripts/flameshotfocus.sh

# -------------------------------------- brightness
# # Increase brightness
# bindsym $mod+F6 exec --no-startup-id brightnessctl set +5%
# # Decrease brightness
# bindsym $mod+F5 exec --no-startup-id brightnessctl set 5%-
bindsym XF86MonBrightnessUp exec --no-startup-id "brightnessctl s +10% && ~/.config/eww/scripts/osd_trigger.sh bright"
bindsym XF86MonBrightnessDown exec --no-startup-id "brightnessctl s 10%- && ~/.config/eww/scripts/osd_trigger.sh bright"

# -------------------------------------  Navigation
# Alt-tab
# bindsym $mod+Tab workspace back_and_forth
bindsym $mod+Right workspace next
bindsym $mod+Left workspace prev

# Change focus 
bindsym $mod+j focus down
bindsym $mod+k focus up
bindsym $mod+l focus right
bindsym mod1+Tab focus next
# bindsym mod1+Tab [con_mark=_back] focus
bindsym mod1+Shift+Tab focus prev
bindsym $mod+h focus left

# Move focused window
set $pixel 50px
bindsym $mod+Shift+j move down $pixel
bindsym $mod+Shift+k move up $pixel
bindsym $mod+Shift+l move right $pixel
bindsym $mod+Shift+h move left $pixel
bindsym $mod+Shift+Left move left
bindsym $mod+Shift+Down move down
bindsym $mod+Shift+Up move up
bindsym $mod+Shift+Right move right

# Split in horizontal orientation
bindsym $mod+b split h

# Split in vertical orientation
bindsym $mod+v split v

# Fullscreen
bindsym $mod+f fullscreen toggle

# Layout (Tab,Tile,Float)
bindsym $mod+s floating toggle
bindsym $mod+t sticky toggle
bindsym $mod+w layout tabbed
bindsym $mod+e layout toggle split

# Toggle tiling / floating focus
bindsym $mod+Shift+s focus mode_toggle

# Focus child or parent
bindsym $mod+a focus parent
bindsym $mod+z focus child

# Switch workspace
bindsym $mod+1 workspace number $ws1
bindsym $mod+2 workspace number $ws2
bindsym $mod+3 workspace number $ws3
bindsym $mod+4 workspace number $ws4
bindsym $mod+5 workspace number $ws5
bindsym $mod+6 workspace number $ws6
bindsym $mod+7 workspace number $ws7
bindsym $mod+8 workspace number $ws8
bindsym $mod+9 workspace number $ws9
bindsym $mod+0 workspace number $ws10
bindsym $mod+minus workspace number $ws11
bindsym $mod+equal workspace number $ws12
bindsym $mod+control+3 workspace number $ws13


# Move Windows
bindsym $mod+Shift+1 move container to workspace number $ws1
bindsym $mod+Shift+2 move container to workspace number $ws2
bindsym $mod+Shift+3 move container to workspace number $ws3
bindsym $mod+Shift+4 move container to workspace number $ws4
bindsym $mod+Shift+5 move container to workspace number $ws5
bindsym $mod+Shift+6 move container to workspace number $ws6
bindsym $mod+Shift+7 move container to workspace number $ws7
bindsym $mod+Shift+8 move container to workspace number $ws8
bindsym $mod+Shift+9 move container to workspace number $ws9
bindsym $mod+Shift+0 move container to workspace number $ws10
bindsym $mod+Shift+minus move container to workspace number $ws11
bindsym $mod+Shift+equal move container to workspace number $ws12
bindsym $mod+control+Shift+3 move container to workspace number $ws13

# Restart & Reload
bindsym $mod+Shift+c reload
bindsym $mod+Shift+r restart

# Resize window
mode "resize" {
        bindsym h resize shrink width 10 px or 10 ppt
        bindsym k resize grow height 10 px or 10 ppt
        bindsym j resize shrink height 10 px or 10 ppt
        bindsym l resize grow width 10 px or 10 ppt

        # same bindings, but for the arrow keys
        bindsym Left resize shrink width 10 px or 10 ppt
        bindsym Down resize grow height 10 px or 10 ppt
        bindsym Up resize shrink height 10 px or 10 ppt
        bindsym Right resize grow width 10 px or 10 ppt

        # back to normal: Enter or Escape or $mod+r
        bindsym Return mode "default"
        bindsym Escape mode "default"
        bindsym $mod+r mode "default"
}
bindsym $mod+r mode "resize"


