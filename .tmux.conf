bind r source-file ~/.tmux.conf

set -g prefix C-s
set -g mouse on

# Resize panes using Alt + h, j, k, l (no prefix)
#
bind -r M-h resize-pane -L 5
bind -r M-j resize-pane -D 5
bind -r M-k resize-pane -U 5
bind -r M-l resize-pane -R 5

# Bind h, j, k, l to switch panes
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# biar gak delay abis instert mode ke normal mode abis mencet esc
set -sg escape-time 10


# Split panes and inherit the active directory
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

set -g allow-passthrough on

set -g base-index 1
setw -g pane-base-index 1
set-option -g renumber-windows on

## List of plugins
set -g @plugin 'tmux-plugins/tpm'
# set -g @plugin 'tmux-plugins/tmux-sensible'

set -g @plugin "christoomey/vim-tmux-navigator"
set -g @plugin "Morantron/tmux-fingers"
set -g @plugin "fabioluciano/tmux-powerkit"
# set -g @plugin "binoymanoj/tmux-minimal-theme"

# set -g @plugin "semi710/minimal-tmux-status"

## powerkit config
set -g @powerkit_session_icon "箱"
set -g @powerkit_transparent "false"
# set -g @powerkit_theme "hackerman"
set -g @powerkit_theme "eruiui23"
# set -g @powerkit_theme "osaka-jade"
set -g @powerkit_theme_variant "default"
set -g @powerkit_edge_separator_style "none"
set -g @powerkit_separator_style "none"
set -g @powerkit_elements_spacing "false"
set -g @powerkit_session_padding "true"
set -g @powerkit_plugin_timezones_icon "none"
set -g @powerkit_plugin_hostname_icon "none"
set -g @powerkit_plugin_timezones_zones "Asia/Tokyo,Asia/Jakarta"
set -g @powerkit_plugins "wifi,timezones,hostname"
# Disable the icon for the active/current window
set -g @powerkit_window_active_icon ""
## wifi plugin
# Visibility control: connected, disconnected, always
set -g @powerkit_plugin_wifi_show_when "connected"

# Display format: ssid, ip, signal (comma-separated for multiple)
set -g @powerkit_plugin_wifi_format "ssid"
set -g @powerkit_plugin_wifi_separator " | "
set -g @powerkit_plugin_wifi_max_length "20"

# Icons - signal-based (auto-selected)
set -g @powerkit_plugin_wifi_icon "none"
set -g @powerkit_plugin_wifi_icon_excellent "none"
set -g @powerkit_plugin_wifi_icon_good "none"
set -g @powerkit_plugin_wifi_icon_fair "none"
set -g @powerkit_plugin_wifi_icon_weak "none"
set -g @powerkit_plugin_wifi_icon_poor "none"
set -g @powerkit_plugin_wifi_icon_disconnected "none"

# Cache duration (seconds)
set -g @powerkit_plugin_wifi_cache_ttl "5"
# minimal theme config
# set -g @minimal_theme_bg_color "#1c2225"
# set -g @minimal_theme_active_color "#2ed1ab"
# set -g @minimal_theme_inactive_color "#c9d2d4"
# set -g @minimal_theme_text_color "#e8e8e8"
# set -g @minimal_theme_accent_color "#e8e8e8"
# set -g @minimal_theme_border_color "#373B41"

set -g @powerkit_active_window_icon ""

# Inactive window icon
set -g @powerkit_inactive_window_icon ""
# Disable the icon for inactive windows
set -g @powerkit_window_inactive_icon ""

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
set -g status-position bottom
set -g @powerkit_plugin_no_icon_bg_style "content"
